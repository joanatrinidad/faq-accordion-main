<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="src/styles/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | FAQ accordion</title>
  </head>
  <body>
    <div class="container">
      <header>
        <img src="/assets/images/background-pattern-desktop.svg" />
      </header>

      <section>
        <div class="sectionItems">
          <div class="title">
            <img src="/assets/images/icon-star.svg" alt="icon-star" />
            <h1>FAQs</h1>
          </div>
          <div class="accordionOne">
            <button class="accordion">
              <span>What is Frontend Mentor, and how will it help me?</span>
              <img src="/assets/images/icon-plus.svg" alt="icon-plus" />
            </button>
            <div class="panel">
              Frontend Mentor offers realistic coding challenges to help
              developers improve their frontend coding skills with projects in
              HTML, CSS, and JavaScript. It's suitable for all levels and ideal
              for portfolio building.
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer> -->

    <script type="module">
      import { faq } from "/src/js/accordion.js";
      let accordion = document.getElementsByClassName("accordion");
      let i;

      for (i = 0; i < accordion.length; i++) {
        accordion[i].addEventListener("click", function () {
          this.classList.toggle("active");
          let panel = this.nextElementSibling;

          if (panel.style.display === "block") {
            panel.style.display = "none";
          } else {
            panel.style.display = "block";
          }
        });
      }
    </script>
  </body>
</html>
